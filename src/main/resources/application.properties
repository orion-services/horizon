# =============================================================================
# Aplicação
# =============================================================================
quarkus.application.name=horizon

# =============================================================================
# Crawler — limites e navegação
# =============================================================================
# Profundidade máxima na árvore de links a partir da URL inicial (níveis de
# “cliques”).
horizon.crawler.max-depth=5
# Número máximo de páginas visitadas antes de encerrar o crawl.
horizon.crawler.max-steps=20
# Tempo máximo (ms) para uma sessão de crawl antes de encerrar por timeout.
horizon.crawler.session-timeout-ms=60000
# Número de threads usadas para trabalho paralelo do crawler.
horizon.crawler.thread-count=3
# Se true, só segue links do mesmo domínio que a origem; evita sair para sites
# externos.
horizon.crawler.restrict-to-domain=true

# =============================================================================
# Crawler — conteúdo e chunks
# =============================================================================
# Tamanho mínimo do conteúdo extraído (caracteres) para considerar a página
# utilizável.
horizon.crawler.min-content-length=200
# Tamanho de cada chunk de texto ao fatiar o conteúdo (ex.: para embedding ou
# LLM).
horizon.crawler.chunk-size=3000
# Sobreposição entre chunks consecutivos para não cortar frases no meio.
horizon.crawler.chunk-overlap=300

# =============================================================================
# Crawler — timeouts (fetch e parsing)
# =============================================================================
# Timeout (ms) para operações do Playwright (carregar página, esperas de
# rede/DOM).
horizon.crawler.playwright-timeout-ms=15000
# Timeout (ms) para enriquecimento/parsing com Jsoup (HTML estático ou
# pós-fetch).
horizon.crawler.jsoup-enrich-timeout-ms=5000

# =============================================================================
# Crawler — relevância e LLM
# =============================================================================
# Limiar de score na etapa prévia (filtro rápido antes de chamadas mais caras).
horizon.crawler.pre-threshold=0.40
# Limiar de score na etapa final (decisão de relevância/aceitação do conteúdo).
horizon.crawler.final-threshold=0.60
# Atraso (ms) entre chamadas ao LLM para reduzir pressão sobre quota/rate limit.
horizon.crawler.llm-delay-ms=500

# =============================================================================
# Crawler — HTTP 429 (Too Many Requests)
# =============================================================================
# Segundos de espera após HTTP 429, por tentativa (lista = backoff progressivo).
horizon.crawler.backoff-429-seconds=30,60,120
# Quantos 429 consecutivos tolerar antes de desistir ou parar o fluxo afetado.
horizon.crawler.max-consecutive-429=3

# =============================================================================
# Banco de dados — desenvolvimento (%dev)
# =============================================================================
# H2 em memória: não exige PostgreSQL nem Docker. Esquema via Hibernate
# (drop-and-create). Flyway desligado: migrações em db/migration são só
# PostgreSQL; em %prod usa-se Postgres + Flyway + validate.
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=\
  jdbc:h2:mem:horizon-dev;DB_CLOSE_DELAY=-1
%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%dev.quarkus.flyway.enabled=false

# =============================================================================
# Banco de dados — testes (%test)
# =============================================================================
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:horizon-test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.flyway.enabled=false

# =============================================================================
# Banco de dados — produção (%prod)
# =============================================================================
# PostgreSQL (variáveis de ambiente ou valores padrão locais)
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DB_USERNAME:postgres}
%prod.quarkus.datasource.password=${DB_PASSWORD:postgres}
%prod.quarkus.datasource.jdbc.url=\
  ${DB_JDBC_URL:jdbc:postgresql://localhost:5432/horizon}
%prod.quarkus.hibernate-orm.schema-management.strategy=validate
